    <style>
      body {
        animation: fadeIn 0.4s ease-out forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-out {
        animation: fadeOut 0.3s ease-in forwards;
      }
      @keyframes fadeOut {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(-10px);
        }
      }
    </style>
    <script>
      function go(url) {
        document.body.classList.add("fade-out");
        setTimeout(function () {
          window.location.href = url;
        }, 300);
      }

      // Fungsi interaktif toggle switch yang aman dari konflik click redirect
      function toggleSwitch(element, event) {
        if (event) event.stopPropagation();
        element.classList.toggle("active-toggle");
      }

      document.addEventListener("DOMContentLoaded", function () {
        var routes = {
          kemana: "cari_rute.html",
          Cari: "cari_rute.html",
          Setelan: "pengaturan.html",
          Estimasi: "pilih_mode.html",
          Beranda: "beranda.html",
          Kembali: "beranda.html",
          "Bundaran HI": "konfirmasi_rute.html",
          "Mulai Navigasi": "navigasi.html",
          OK: "sampai.html",
          "Lihat rute": "beranda.html",
        };

        if (window.location.pathname.indexOf("navigasi") !== -1) {
          document.body.style.cursor = "pointer";
          document.body.onclick = function () {
            go("waktu_turun.html");
          };
        }

        var walker = document.createTreeWalker(
          document.body,
          NodeFilter.SHOW_TEXT,
          null,
          false,
        );
        var node;
        while ((node = walker.nextNode())) {
          var text = node.nodeValue.trim();
          if (!text) continue;

          for (var key in routes) {
            if (text.indexOf(key) !== -1) {
              if (
                key === "Bundaran HI" &&
                (window.location.pathname.indexOf("konfirmasi") !== -1 ||
                  window.location.pathname.indexOf("sampai") !== -1 ||
                  window.location.pathname.indexOf("waktu_turun") !== -1 ||
                  window.location.pathname.indexOf("pilih_mode") !== -1)
              ) {
                continue;
              }

              var curr = node.parentElement;
              if (curr && curr.closest && curr.closest(".setting-row")) {
                continue;
              }

              while (curr && curr.tagName !== "BODY") {
                var rect = curr.getBoundingClientRect();

                if (
                  rect.width >= 370 &&
                  rect.height >= 70 &&
                  curr !== node.parentElement
                ) {
                  break;
                }

                curr.style.cursor = "pointer";
                curr.onclick = (function (url) {
                  return function (e) {
                    e.stopPropagation();
                    go(url);
                  };
                })(routes[key]);

                curr = curr.parentElement;
              }
            }
          }
        }

        document.querySelectorAll(".toggle-mock").forEach(function (toggle) {
          toggle.addEventListener("click", function (e) {
            e.stopPropagation();
            toggleSwitch(this);
          });
        });

        document.querySelectorAll(".setting-row").forEach(function (row) {
          row.addEventListener("click", function (e) {
            if (e.target.closest(".toggle-mock")) return;
            var toggle = row.querySelector(".toggle-mock");
            if (toggle) {
              toggleSwitch(toggle);
            }
          });
        });
      });
    </script>
